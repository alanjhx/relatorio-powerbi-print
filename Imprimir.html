<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Power BI</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  #toolbar {
    background: #0078D4;
    color: white;
    text-align: center;
    padding: 12px;
    font-family: Arial, sans-serif;
  }
  #toolbar button {
    background-color: white;
    color: #0078D4;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    padding: 10px 20px;
    cursor: pointer;
  }
  #toolbar button:hover {
    background-color: #f2f2f2;
  }
  #report {
    width: 100%;
    height: calc(100% - 52px);
    border: none;
  }
</style>
</head>
<body>
<div id="toolbar">
  <button onclick="window.print()">🖨️ Imprimir Relatório</button>
</div>
<iframe id="report"
        src="https://app.powerbi.com/reportEmbed?reportId=2ad5c0a3-eace-414d-9da0-3676a8356362&autoAuth=true&ctid=37a72eb7-1faf-49d3-9ddc-6b923b751bc0&actionBarEnabled=true&reportCopilotInEmbed=true"
        allowfullscreen="true">
</iframe>
</body>
</html>
